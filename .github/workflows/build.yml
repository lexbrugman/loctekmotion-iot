name: Build firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ESP8266 firmware
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.esphome-build.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generate secrets.yaml from repository secrets. If a secret is not set,
      # a placeholder is used so the build still compiles (the resulting binary
      # just won't connect to your Wi-Fi until you set the secrets and rebuild).
      - name: Create secrets.yaml
        run: |
          cat > secrets.yaml <<EOF
          wifi_ssid: "${{ secrets.WIFI_SSID || 'changeme-ssid' }}"
          wifi_password: "${{ secrets.WIFI_PASSWORD || 'changeme-password' }}"
          ap_fallback_password: "${{ secrets.AP_FALLBACK_PASSWORD || 'changeme-fallback' }}"
          api_encryption_key: "${{ secrets.API_ENCRYPTION_KEY || 'iOZqtvw31Yy6sasRl5h2DElG2VDlqW2WjJEKObVN8bg=' }}"
          EOF

      - name: Build firmware
        id: esphome-build
        uses: esphome/build-action@v7
        with:
          yaml-file: office-desk.yaml
          # Latest ESPHome release as of 2026-06. Bump as new releases land.
          version: "2026.5.3"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.esphome-build.outputs.name }}
          path: ${{ steps.esphome-build.outputs.name }}

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.name }}
          path: firmware

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/*
